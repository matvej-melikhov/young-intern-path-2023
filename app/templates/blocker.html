{% extends "base-blank.html" %}

{% block title %} Игра не началась {% endblock %}

{% block body %}

    <div class="blocker">
        <div class="blocker__inner">
            <a href="{{url_for('index')}}" class="blocker__to-main"><i class="fa-solid fa-house"></i>На главную</a>
            <img src="{{ url_for('static', filename='img/logo.png') }}" alt="" class="blocker__logo">
            <div class="blocker__item">
                <div class="blocker__text">
                    <i class="fa-solid fa-clock"></i>До начала игры осталось:
                    <div class="blocker__time">
                        <span class="countdown"></span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <a href="https://vk.com/eltech_career" class="vk-btn btn"><i class="fa-brands fa-vk"></i></a>
    <div class="back"></div>

    <script>
        window.onload = function() {

            var distance = {{ delta }};
            var output = document.querySelector(".countdown");

            function pad(value) {
                return ('00' + value).slice(-2);
            }

            function render() {
                var days = Math.floor(distance / 86400);
                var hours = Math.floor(distance % 86400 / 3600);
                var minutes = Math.floor(distance % 3600 / 60);
                var seconds = Math.floor(distance % 60);
                var text = pad(hours) + ":" + pad(minutes) + ":" + pad(seconds);
                if (days > 0) {
                    text = days + " д " + text;
                }
                output.textContent = text;
            }

            render();

            var timerId = setInterval(function() {
                distance--;

                if (distance <= 0) {
                    distance = 0;
                    render();
                    clearInterval(timerId);
                    window.location.href = "{{ url_for(next) }}";
                    return;
                }

                render();
            }, 1000);
        }
    </script>

{% endblock %}
